<!DOCTYPE html>
<html>

<head>
  <title>CSS Box Model</title>
  <style>
    .box1 {
      background-color: aliceblue;
      width: 100px;
      height: 100px;
      border: 20px solid black;
      margin: 20px;
      padding: 30px;
    }

    .box2 {
      border: 3px solid red;
      margin-top: 10px;
      margin-right: 20px;
      margin-bottom: 30px;
      margin-left: 40px;
      padding: 20px 30px 20px 30px;
      width: 50px;
      height: 50px;
    }
  </style>
</head>

<body>
  <div class="box1">내용 입력</div>
  <div class="box2">내용 입력</div>
</body>

</html>
