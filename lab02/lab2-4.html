<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>실습 2-4</title>
  <style>
    .box {
      width: 300px;
      height: 70px;
      margin: 0 auto;
    }

    #style1 {
      background-color: #a90000;
      color: white;
    }

    #style2 {
      background: linear-gradient(to right, #50bc7b, #002112);
      color: rgba(255, 255, 255, 0.9)
    }

    #style3 {
      background: radial-gradient(#21294a, #005bd2);
      color: rgba(255, 255, 255, 0.9)
    }

    h1 {
      text-align: center;
      line-height: 70px;
      text-shadow: 4px 3px 10px rgb(0, 0, 0);
    }

    #basic {
      text-shadow: 4px 3px 10px rgb(50, 0, 0);
    }
  </style>
</head>

<body>
  <div class="box" id="style1">
    <h1 id="basic">웹 개발 기초</h1>
  </div>
  <div class="box" id="style2">
    <h1>웹 개발 중급</h1>
  </div>
  <div class="box" id="style3">
    <h1>웹 개발 고급</h1>
  </div>
</body>

</html>
